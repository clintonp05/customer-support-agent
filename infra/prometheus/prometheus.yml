global:
  scrape_interval: 15s       # Pull metrics every 15 seconds
  evaluation_interval: 15s   # Evaluate alert rules every 15 seconds

scrape_configs:
  - job_name: 'noon-support-agent'
    static_configs:
      # host.docker.internal = your Mac's localhost from inside the Docker container
      # If the app runs in Docker too, change to the service name: 'agent:8000'
      - targets: ['host.docker.internal:4501']
    metrics_path: '/metrics'
